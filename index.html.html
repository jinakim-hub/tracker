<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트래커</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f5f7;font-family:-apple-system,sans-serif;padding:16px 12px 60px;color:#1c1c1e;}
h1{text-align:center;font-size:22px;font-weight:900;color:#5e5ce6;margin-bottom:3px;}
.sub{text-align:center;color:#8e8e93;font-size:12px;margin-bottom:14px;}
.acards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.acard{background:#fff;border-radius:14px;padding:12px 8px;box-shadow:0 2px 8px rgba(0,0,0,.07);text-align:center;}
.aclbl{font-size:10px;font-weight:800;color:#8e8e93;letter-spacing:1px;margin-bottom:5px;}
.acface{font-size:28px;line-height:1;margin-bottom:3px;}
.acpct{font-size:20px;font-weight:800;line-height:1;margin-bottom:2px;}
.acmsg{font-size:10px;font-weight:700;margin-bottom:6px;min-height:14px;}
.wbg{height:5px;background:#e5e5ea;border-radius:3px;overflow:hidden;}
.wfill{height:100%;border-radius:3px;}
.nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:10px;}
.nbtn{background:#fff;border:1.5px solid #e5e5ea;width:36px;height:36px;border-radius:50%;font-size:22px;cursor:pointer;}
.nlbl{font-size:12px;color:#5e5ce6;font-weight:700;min-width:110px;text-align:center;}
.dgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px;}
.dc{background:#fff;border:1.5px solid #e5e5ea;border-radius:10px;overflow:hidden;cursor:pointer;}
.dc.sel{border-color:#5e5ce6;}
.dc.tod .dnum{color:#5e5ce6;}
.dh{padding:5px 3px 4px;text-align:center;border-bottom:1px solid #f2f2f7;}
.dnm{font-size:9px;font-weight:700;color:#8e8e93;}
.dnum{font-size:14px;font-weight:700;}
.db{padding:4px 3px;}
.dbar{height:3px;background:#e5e5ea;border-radius:2px;overflow:hidden;margin-bottom:2px;}
.dbfill{height:100%;border-radius:2px;}
.dpct{font-size:9px;text-align:center;color:#8e8e93;}
.panel{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.ptitle{font-size:16px;font-weight:900;margin-bottom:12px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.bdg{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;}
.bw{background:rgba(50,173,230,.1);color:#32ade6;}
.bwt{background:rgba(255,55,95,.1);color:#ff375f;}
.br{background:rgba(142,142,147,.1);color:#8e8e93;}
.sbar{background:#f8f8fa;border:1.5px solid #e5e5ea;border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.rw{width:48px;height:48px;flex-shrink:0;position:relative;}
.rw svg{transform:rotate(-90deg);}
.rpct{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.sdone{font-size:18px;font-weight:900;line-height:1;margin-bottom:2px;}
.ssub{font-size:11px;color:#8e8e93;}
.dots{display:flex;gap:3px;flex-wrap:wrap;max-width:50px;}
.dot{width:6px;height:6px;border-radius:50%;background:#e5e5ea;}
.dot.on{background:#34c759;}
.stitle{font-size:10px;font-weight:800;letter-spacing:1px;color:#8e8e93;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.stitle:after{content:'';flex:1;height:1px;background:#e5e5ea;}
.sec{margin-bottom:12px;}
.cks{display:grid;gap:5px;}
.ci{display:flex;align-items:center;gap:9px;padding:9px 11px;background:#f8f8fa;border:1.5px solid #e5e5ea;border-radius:10px;cursor:pointer;}
.ci.on{border-color:#34c759;background:rgba(52,199,89,.05);}
.cb{width:20px;height:20px;border:2px solid #e5e5ea;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:800;color:#fff;}
.ci.on .cb{background:#34c759;border-color:#34c759;}
.clbl{font-size:13px;font-weight:500;flex:1;}
.ci.on .clbl{color:#34c759;}
.csub{font-size:10px;color:#8e8e93;margin-top:2px;line-height:1.4;}
</style>
</head>
<body>
<h1>&#x1F4AA; 운동 &amp; 식단 트래커</h1>
<p class="sub">건강한 하루를 기록하세요</p>

<div class="acards">
  <div class="acard">
    <div class="aclbl">일일</div>
    <div class="acface" id="DF">&#x1F634;</div>
    <div class="acpct" id="DP">0%</div>
    <div class="acmsg" id="DM">-</div>
    <div class="wbg"><div class="wfill" id="DB" style="width:0%"></div></div>
  </div>
  <div class="acard">
    <div class="aclbl">주간</div>
    <div class="acface" id="WF">&#x1F634;</div>
    <div class="acpct" id="WP">0%</div>
    <div class="acmsg" id="WM">-</div>
    <div class="wbg"><div class="wfill" id="WB" style="width:0%"></div></div>
  </div>
  <div class="acard">
    <div class="aclbl">월간</div>
    <div class="acface" id="MF">&#x1F634;</div>
    <div class="acpct" id="MP">0%</div>
    <div class="acmsg" id="MM">-</div>
    <div class="wbg"><div class="wfill" id="MB" style="width:0%"></div></div>
  </div>
</div>

<div class="nav">
  <button class="nbtn" id="btnPrev">&#8249;</button>
  <div class="nlbl" id="NL">-</div>
  <button class="nbtn" id="btnNext">&#8250;</button>
</div>

<div class="dgrid" id="DG"></div>
<div class="panel" id="PNL"></div>

<script>
var DN = ['일','월','화','수','목','금','토'];
var DT = {0:'rest',1:'rest',2:'walk',3:'weight',4:'walk',5:'weight',6:'weight'};
var TL = {walk:'왕복 8km',weight:'웨이트+러닝',rest:'휴식'};
var TB = {walk:'bw',weight:'bwt',rest:'br'};
var WALK = [{id:'w1',lbl:'왕복 8km 걷기',ic:'[걷기]',sub:'약 2시간 20분'}];
var WGT  = [{id:'g1',lbl:'웨이트 30분',ic:'[웨이트]'},{id:'g2',lbl:'러닝머신 20분',ic:'[런닝]'}];
var AV = [
  {min:100, face:'&#x1F929;', msg:'멋진너!',       col:'#34c759'},
  {min:80,  face:'&#x1F60E;', msg:'선방했다!',     col:'#32ade6'},
  {min:60,  face:'&#x1F611;', msg:'그러면 그렇지!', col:'#ff9f0a'},
  {min:40,  face:'&#x1F624;', msg:'루저냐!',       col:'#ff375f'},
  {min:0,   face:'&#x1F634;', msg:'일어나!',       col:'#8e8e93'}
];

var off = 0;
var si  = new Date().getDay();
var D   = {};

try { var _s = localStorage.getItem('trk2'); if (_s) D = JSON.parse(_s); } catch(e) {}
function sv() { try { localStorage.setItem('trk2', JSON.stringify(D)); } catch(e) {} }

function wdates(o) {
  var t = new Date();
  var s = new Date(t.getFullYear(), t.getMonth(), t.getDate() - t.getDay() + o * 7);
  var a = [];
  for (var i = 0; i < 7; i++) a.push(new Date(s.getFullYear(), s.getMonth(), s.getDate() + i));
  return a;
}

function mdates() {
  var t = new Date();
  var days = new Date(t.getFullYear(), t.getMonth() + 1, 0).getDate();
  var a = [];
  for (var i = 1; i <= days; i++) a.push(new Date(t.getFullYear(), t.getMonth(), i));
  return a;
}

function dk(d) {
  var m = d.getMonth() + 1;
  var dd = d.getDate();
  return d.getFullYear() + '-' + (m < 10 ? '0' + m : m) + '-' + (dd < 10 ? '0' + dd : dd);
}

function gitems(dow) {
  var ex = DT[dow] === 'walk' ? WALK : (DT[dow] === 'weight' ? WGT : []);
  var r = [
    {id:'s2', lbl:'기상 7:00',         ic:'[기상]'},
    {id:'d2', lbl:'아침 (158kcal)',     ic:'[아침]', sub:'계란흰자 64g / 연두부 90g / 토마토 80g / 샐러리 40g / 혼합상추 75g / 소스: 간장5g+들기름3g+깨3g'},
    {id:'d1', lbl:'오전 간식',          ic:'[간식]', sub:'아몬드 8알 (11g)'}
  ];
  for (var i = 0; i < ex.length; i++) r.push(ex[i]);
  r.push({id:'d3', lbl:'점심 (351kcal)', ic:'[점심]', sub:'닭가슴살 100g / 병아리콩 60g / 혼합상추 75g / 토마토 60g / 샐러리 40g / 소스: 홀그레인머스터드15g+스리라차10g+올리브유3g'});
  r.push({id:'d5', lbl:'저녁 (396kcal)', ic:'[저녁]', sub:'닭가슴살 100g / 계란흰자 64g / 병아리콩 60g / 버섯 40g / 양파 20g / 애호박 40g / 옥수수 20g / 혼합상추 75g / 소스: 그릭요거트30g+홀그레인머스터드10g+알룰로스5g'});
  r.push({id:'d4', lbl:'오후 간식',      ic:'[간식]', sub:'당근스틱 50g / 샐러리스틱 50g'});
  r.push({id:'d6', lbl:'6시 전 식사 마감', ic:'[마감]', sub:'저녁 6시 이후 금식'});
  r.push({id:'s4', lbl:'인터렉티브 워밍업', ic:'[워밍업]'});
  r.push({id:'s3', lbl:'스쿼트 50회',    ic:'[스쿼트]', sub:'저녁 루틴'});
  r.push({id:'s1', lbl:'취침 10:30',     ic:'[취침]'});
  return r;
}

function cpct(ds, dow) {
  var items = gitems(dow);
  var dd = D[ds] || {};
  var done = 0;
  for (var i = 0; i < items.length; i++) { if (dd[items[i].id]) done++; }
  return { done: done, total: items.length, pct: Math.round(done / items.length * 100) };
}

function apct(arr) {
  var td = 0, tt = 0;
  for (var i = 0; i < arr.length; i++) {
    var r = cpct(dk(arr[i]), arr[i].getDay());
    td += r.done; tt += r.total;
  }
  return tt > 0 ? Math.round(td / tt * 100) : 0;
}

function gachv(p) {
  for (var i = 0; i < AV.length; i++) { if (p >= AV[i].min) return AV[i]; }
  return AV[AV.length - 1];
}

function gcol(p) {
  if (p >= 100) return '#34c759';
  if (p >= 80)  return '#32ade6';
  if (p >= 60)  return '#ff9f0a';
  if (p >= 40)  return '#ff375f';
  return '#8e8e93';
}

function setCard(fid, pid, mid, bid, pct) {
  var av = gachv(pct);
  document.getElementById(fid).innerHTML = av.face;
  var pe = document.getElementById(pid);
  pe.textContent = pct + '%';
  pe.style.color = av.col;
  var me = document.getElementById(mid);
  me.textContent = av.msg;
  me.style.color = av.col;
  var be = document.getElementById(bid);
  be.style.width = pct + '%';
  be.style.background = av.col;
}

function render() {
  var dates  = wdates(off);
  var today  = dk(new Date());
  var selD   = dates[si];
  var selDs  = dk(selD);
  var selR   = cpct(selDs, selD.getDay());

  // 주간 레이블
  var s = dates[0], e = dates[6];
  document.getElementById('NL').textContent =
    (s.getMonth()+1) + '/' + s.getDate() + ' - ' + (e.getMonth()+1) + '/' + e.getDate();

  // 성취 카드
  setCard('DF','DP','DM','DB', selR.pct);
  setCard('WF','WP','WM','WB', apct(dates));
  setCard('MF','MP','MM','MB', apct(mdates()));

  // 요일 그리드
  var dg = document.getElementById('DG');
  dg.innerHTML = '';
  for (var i = 0; i < dates.length; i++) {
    var d  = dates[i];
    var ds = dk(d);
    var r  = cpct(ds, d.getDay());
    var c  = gcol(r.pct);
    var el = document.createElement('div');
    el.className = 'dc' + (ds === today ? ' tod' : '') + (i === si ? ' sel' : '');
    el.setAttribute('data-idx', i);
    el.innerHTML =
      '<div class="dh"><div class="dnm">' + DN[d.getDay()] + '</div><div class="dnum">' + d.getDate() + '</div></div>' +
      '<div class="db"><div class="dbar"><div class="dbfill" style="width:' + r.pct + '%;background:' + c + '"></div></div>' +
      '<div class="dpct">' + r.pct + '%</div></div>';
    dg.appendChild(el);
  }

  // 체크리스트 패널
  var dow   = selD.getDay();
  var type  = DT[dow];
  var items = gitems(dow);
  var dd    = D[selDs] || {};
  var circ  = 125.66;
  var dash  = circ - (selR.pct / 100) * circ;
  var cc    = gcol(selR.pct);

  var pnl = document.getElementById('PNL');
  pnl.innerHTML = '';

  // 타이틀
  var title = document.createElement('div');
  title.className = 'ptitle';
  title.innerHTML = DN[dow] + '요일 ' + (selD.getMonth()+1) + '/' + selD.getDate() +
    ' <span class="bdg ' + TB[type] + '">' + TL[type] + '</span>';
  pnl.appendChild(title);

  // 요약바
  var sbar = document.createElement('div');
  sbar.className = 'sbar';
  var dotHtml = '';
  for (var i = 0; i < items.length; i++) {
    dotHtml += '<div class="dot' + (dd[items[i].id] ? ' on' : '') + '"></div>';
  }
  sbar.innerHTML =
    '<div class="rw"><svg width="48" height="48" viewBox="0 0 48 48">' +
    '<circle cx="24" cy="24" r="20" fill="none" stroke="#e5e5ea" stroke-width="5"/>' +
    '<circle cx="24" cy="24" r="20" fill="none" stroke="' + cc + '" stroke-width="5"' +
    ' stroke-dasharray="' + circ + '" stroke-dashoffset="' + dash + '" stroke-linecap="round"/>' +
    '</svg><div class="rpct" style="color:' + cc + '">' + selR.pct + '%</div></div>' +
    '<div style="flex:1"><div class="sdone" style="color:' + cc + '">' + selR.done + ' / ' + selR.total + '</div>' +
    '<div class="ssub">' + (selR.pct === 100 ? '완벽한 하루!' : '하나씩 체크해봐요!') + '</div></div>' +
    '<div class="dots">' + dotHtml + '</div>';
  pnl.appendChild(sbar);

  // 체크 항목
  var sec = document.createElement('div');
  sec.className = 'sec';
  sec.innerHTML = '<div class="stitle">오늘의 체크리스트</div>';
  var cks = document.createElement('div');
  cks.className = 'cks';

  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var ci = document.createElement('div');
    ci.className = 'ci' + (dd[it.id] ? ' on' : '');
    ci.setAttribute('data-ds', selDs);
    ci.setAttribute('data-id', it.id);
    ci.innerHTML =
      '<div class="cb">' + (dd[it.id] ? '&#x2713;' : '') + '</div>' +
      '<div style="flex:1"><div class="clbl">' + it.lbl + '</div>' +
      (it.sub ? '<div class="csub">' + it.sub + '</div>' : '') + '</div>';
    cks.appendChild(ci);
  }
  sec.appendChild(cks);
  pnl.appendChild(sec);
}

// 이벤트 위임 방식 - onclick 인라인 완전 제거
document.getElementById('DG').addEventListener('click', function(e) {
  var el = e.target;
  while (el && el !== this) {
    if (el.getAttribute('data-idx') !== null) {
      si = parseInt(el.getAttribute('data-idx'));
      render();
      return;
    }
    el = el.parentNode;
  }
});

document.getElementById('PNL').addEventListener('click', function(e) {
  var el = e.target;
  while (el && el !== this) {
    if (el.getAttribute('data-ds') !== null) {
      var ds = el.getAttribute('data-ds');
      var id = el.getAttribute('data-id');
      if (!D[ds]) D[ds] = {};
      D[ds][id] = !D[ds][id];
      sv();
      render();
      return;
    }
    el = el.parentNode;
  }
});

document.getElementById('btnPrev').addEventListener('click', function() { off--; render(); });
document.getElementById('btnNext').addEventListener('click', function() { off++; render(); });

render();
</script>
</body>
</html>
