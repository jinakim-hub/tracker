<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트래커</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f5f7;font-family:-apple-system,sans-serif;color:#1c1c1e;}
h1{text-align:center;font-size:20px;font-weight:900;color:#5e5ce6;padding:16px 0 2px;}
.sub{text-align:center;color:#8e8e93;font-size:11px;margin-bottom:12px;}

/* 탭 */
.tabs{display:flex;background:#fff;border-bottom:1px solid #e5e5ea;position:sticky;top:0;z-index:10;}
.tab{flex:1;padding:11px 4px;text-align:center;font-size:12px;font-weight:700;color:#8e8e93;cursor:pointer;border-bottom:2px solid transparent;}
.tab.on{color:#5e5ce6;border-bottom-color:#5e5ce6;}

.page{display:none;padding:12px 12px 80px;}
.page.on{display:block;}

/* 성취 카드 */
.acards{display:flex;gap:8px;margin-bottom:12px;}
.acard{background:#fff;border-radius:14px;padding:12px 8px;box-shadow:0 2px 8px rgba(0,0,0,.07);text-align:center;flex:1;}
.aclbl{font-size:10px;font-weight:800;color:#8e8e93;letter-spacing:1px;margin-bottom:4px;}
.acface{font-size:24px;line-height:1;margin-bottom:2px;}
.acpct{font-size:18px;font-weight:800;line-height:1;margin-bottom:2px;}
.acmsg{font-size:9px;font-weight:700;margin-bottom:5px;min-height:12px;}
.wbg{height:4px;background:#e5e5ea;border-radius:3px;overflow:hidden;}
.wfill{height:100%;border-radius:3px;}

/* 네비 */
.nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:10px;}
.nbtn{background:#fff;border:1.5px solid #e5e5ea;width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;}
.nlbl{font-size:12px;color:#5e5ce6;font-weight:700;min-width:110px;text-align:center;}

/* 요일 그리드 */
.dgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px;}
.dc{background:#fff;border:1.5px solid #e5e5ea;border-radius:10px;overflow:hidden;cursor:pointer;}
.dc.sel{border-color:#5e5ce6;}
.dc.tod .dnum{color:#5e5ce6;}
.dh{padding:4px 2px;text-align:center;border-bottom:1px solid #f2f2f7;}
.dnm{font-size:9px;font-weight:700;color:#8e8e93;}
.dnum{font-size:13px;font-weight:700;}
.db{padding:3px 3px;}
.dbar{height:3px;background:#e5e5ea;border-radius:2px;overflow:hidden;margin-bottom:2px;}
.dbfill{height:100%;border-radius:2px;}
.dpct{font-size:8px;text-align:center;color:#8e8e93;}

/* 패널 */
.panel{background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.ptitle{font-size:15px;font-weight:900;margin-bottom:10px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.bdg{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;}
.bw{background:rgba(50,173,230,.1);color:#32ade6;}
.bwt{background:rgba(255,55,95,.1);color:#ff375f;}
.br{background:rgba(142,142,147,.1);color:#8e8e93;}
.sbar{background:#f8f8fa;border:1.5px solid #e5e5ea;border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.rw{width:44px;height:44px;flex-shrink:0;position:relative;}
.rw svg{transform:rotate(-90deg);}
.rpct{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.sdone{font-size:16px;font-weight:900;line-height:1;margin-bottom:2px;}
.ssub{font-size:10px;color:#8e8e93;}
.dots{display:flex;gap:3px;flex-wrap:wrap;max-width:48px;}
.dot{width:5px;height:5px;border-radius:50%;background:#e5e5ea;}
.dot.on{background:#34c759;}
.stitle{font-size:10px;font-weight:800;letter-spacing:1px;color:#8e8e93;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.stitle:after{content:'';flex:1;height:1px;background:#e5e5ea;}
.sec{margin-bottom:10px;}
.cks{display:grid;gap:5px;}
.ci{display:flex;align-items:center;gap:9px;padding:9px 11px;background:#f8f8fa;border:1.5px solid #e5e5ea;border-radius:10px;cursor:pointer;}
.ci.on{border-color:#34c759;background:rgba(52,199,89,.05);}
.cb{width:20px;height:20px;border:2px solid #e5e5ea;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:800;color:#fff;}
.ci.on .cb{background:#34c759;border-color:#34c759;}
.clbl{font-size:13px;font-weight:500;flex:1;}
.ci.on .clbl{color:#34c759;}
.csub{font-size:10px;color:#8e8e93;margin-top:2px;line-height:1.4;}

/* 신체 기록 */
.body-date{text-align:center;font-size:13px;font-weight:700;color:#5e5ce6;margin-bottom:12px;}
.bfields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.bfield{background:#fff;border-radius:14px;padding:14px 12px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.bflbl{font-size:10px;font-weight:800;color:#8e8e93;margin-bottom:6px;}
.bfinput{display:flex;align-items:center;gap:4px;}
.bfinput input{width:100%;border:1.5px solid #e5e5ea;border-radius:8px;padding:7px 8px;font-size:16px;font-weight:700;color:#1c1c1e;background:#f8f8fa;-webkit-appearance:none;}
.bfinput input:focus{outline:none;border-color:#5e5ce6;}
.bfunit{font-size:11px;color:#8e8e93;white-space:nowrap;}
.bfsave{width:100%;padding:13px;background:#5e5ce6;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:16px;}
.bflast{font-size:11px;color:#8e8e93;text-align:center;margin-bottom:16px;}

/* 그래프 탭 */
.gtabs{display:flex;gap:6px;margin-bottom:12px;}
.gtab{flex:1;padding:7px 4px;text-align:center;font-size:11px;font-weight:700;color:#8e8e93;background:#fff;border:1.5px solid #e5e5ea;border-radius:8px;cursor:pointer;}
.gtab.on{background:#5e5ce6;color:#fff;border-color:#5e5ce6;}
.gmetric{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.gmbtn{padding:5px 10px;font-size:11px;font-weight:700;color:#8e8e93;background:#fff;border:1.5px solid #e5e5ea;border-radius:20px;cursor:pointer;}
.gmbtn.on{background:#5e5ce6;color:#fff;border-color:#5e5ce6;}
.chart-wrap{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:12px;}
.chart-title{font-size:12px;font-weight:800;color:#1c1c1e;margin-bottom:10px;}
.chart-area{position:relative;height:160px;width:100%;}
canvas{width:100%!important;}
.no-data{text-align:center;color:#8e8e93;font-size:13px;padding:40px 0;}

/* 최근 기록 */
.rlist{display:grid;gap:8px;}
.ritem{background:#fff;border-radius:12px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;gap:10px;}
.rdate{font-size:11px;font-weight:700;color:#5e5ce6;min-width:50px;}
.rstats{display:flex;gap:10px;flex-wrap:wrap;flex:1;}
.rstat{font-size:11px;color:#1c1c1e;}
.rstat span{font-weight:800;}
</style>
</head>
<body>
<h1>💪 운동 & 식단 트래커</h1>
<p class="sub">건강한 하루를 기록하세요</p>

<div class="tabs">
  <div class="tab on" data-tab="check">✅ 체크</div>
  <div class="tab" data-tab="body">⚖️ 신체기록</div>
  <div class="tab" data-tab="graph">📈 그래프</div>
</div>

<!-- 체크 탭 -->
<div class="page on" id="page-check">
  <div class="acards">
    <div class="acard"><div class="aclbl">일일</div><div class="acface" id="DF">😴</div><div class="acpct" id="DP">0%</div><div class="acmsg" id="DM">-</div><div class="wbg"><div class="wfill" id="DB" style="width:0%"></div></div></div>
    <div class="acard"><div class="aclbl">주간</div><div class="acface" id="WF">😴</div><div class="acpct" id="WP">0%</div><div class="acmsg" id="WM">-</div><div class="wbg"><div class="wfill" id="WB" style="width:0%"></div></div></div>
    <div class="acard"><div class="aclbl">월간</div><div class="acface" id="MF">😴</div><div class="acpct" id="MP">0%</div><div class="acmsg" id="MM">-</div><div class="wbg"><div class="wfill" id="MB" style="width:0%"></div></div></div>
  </div>
  <div class="nav">
    <button class="nbtn" id="btnPrev">&#8249;</button>
    <div class="nlbl" id="NL">-</div>
    <button class="nbtn" id="btnNext">&#8250;</button>
  </div>
  <div class="dgrid" id="DG"></div>
  <div class="panel" id="PNL"></div>
</div>

<!-- 신체기록 탭 -->
<div class="page" id="page-body">
  <div class="body-date" id="body-date-lbl">오늘 기록</div>
  <div class="bfields">
    <div class="bfield"><div class="bflbl">총 몸무게</div><div class="bfinput"><input type="number" id="b-weight" placeholder="62.0" step="0.1"><span class="bfunit">kg</span></div></div>
    <div class="bfield"><div class="bflbl">지방 무게</div><div class="bfinput"><input type="number" id="b-fat" placeholder="0.0" step="0.1"><span class="bfunit">kg</span></div></div>
    <div class="bfield"><div class="bflbl">체지방률</div><div class="bfinput"><input type="number" id="b-fatpct" placeholder="0.0" step="0.1"><span class="bfunit">%</span></div></div>
    <div class="bfield"><div class="bflbl">내장지방지수</div><div class="bfinput"><input type="number" id="b-visceral" placeholder="0" step="1"><span class="bfunit">단계</span></div></div>
  </div>
  <button class="bfsave" id="btn-save-body">저장하기</button>
  <div class="bflast" id="body-last-lbl"></div>

  <div class="stitle" style="margin-bottom:10px;">최근 기록</div>
  <div class="rlist" id="body-rlist"></div>
</div>

<!-- 그래프 탭 -->
<div class="page" id="page-graph">
  <div class="gtabs">
    <div class="gtab on" data-grange="week">주간</div>
    <div class="gtab" data-grange="month">월간</div>
    <div class="gtab" data-grange="all">전체</div>
  </div>
  <div class="gmetric">
    <div class="gmbtn on" data-metric="weight">몸무게</div>
    <div class="gmbtn" data-metric="fat">지방kg</div>
    <div class="gmbtn" data-metric="fatpct">체지방%</div>
    <div class="gmbtn" data-metric="visceral">내장지방</div>
  </div>
  <div class="chart-wrap">
    <div class="chart-title" id="chart-title">몸무게 변화</div>
    <div class="chart-area"><canvas id="myChart"></canvas></div>
    <div class="no-data" id="no-data" style="display:none;">기록된 데이터가 없어요</div>
  </div>
</div>

<script>
// ── 데이터 ──────────────────────────────────────────────
var D = {}, BD = {};
try { var _s = localStorage.getItem('trk3'); if (_s) D = JSON.parse(_s); } catch(e) {}
try { var _b = localStorage.getItem('bdy1'); if (_b) BD = JSON.parse(_b); } catch(e) {}
function sv()  { try { localStorage.setItem('trk3', JSON.stringify(D));  } catch(e) {} }
function svb() { try { localStorage.setItem('bdy1', JSON.stringify(BD)); } catch(e) {} }

var DN = ['일','월','화','수','목','금','토'];
var DT = {0:'rest',1:'rest',2:'walk',3:'weight',4:'walk',5:'weight',6:'weight'};
var TL = {walk:'왕복 8km',weight:'웨이트+러닝',rest:'휴식'};
var TB = {walk:'bw',weight:'bwt',rest:'br'};
var WALK = [{id:'w1',lbl:'왕복 8km 걷기',sub:'약 2시간 20분'}];
var WGT  = [{id:'g1',lbl:'웨이트 30분'},{id:'g2',lbl:'러닝머신 20분'}];
var AV   = [
  {min:100,face:'🤩',msg:'멋진너!',col:'#34c759'},
  {min:80, face:'😎',msg:'선방했다!',col:'#32ade6'},
  {min:60, face:'😑',msg:'그러면 그렇지!',col:'#ff9f0a'},
  {min:40, face:'😤',msg:'루저냐!',col:'#ff375f'},
  {min:0,  face:'😴',msg:'일어나!',col:'#8e8e93'}
];

var off = 0, si = new Date().getDay();
var curTab = 'check', gRange = 'week', gMetric = 'weight';

// ── 날짜 유틸 ────────────────────────────────────────────
function wdates(o) {
  var t = new Date();
  var s = new Date(t.getFullYear(), t.getMonth(), t.getDate() - t.getDay() + o * 7);
  var a = [];
  for (var i = 0; i < 7; i++) a.push(new Date(s.getFullYear(), s.getMonth(), s.getDate()+i));
  return a;
}
function mdates() {
  var t = new Date(), days = new Date(t.getFullYear(), t.getMonth()+1, 0).getDate(), a = [];
  for (var i = 1; i <= days; i++) a.push(new Date(t.getFullYear(), t.getMonth(), i));
  return a;
}
function dk(d) {
  var m = d.getMonth()+1, dd = d.getDate();
  return d.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(dd<10?'0'+dd:dd);
}
function dkToDate(s) { var p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }

// ── 체크 로직 ────────────────────────────────────────────
function gitems(dow) {
  var ex = DT[dow]==='walk' ? WALK : (DT[dow]==='weight' ? WGT : []);
  var r = [
    {id:'s2',lbl:'기상 7:00'},
    {id:'d2',lbl:'아침 (158kcal)',sub:'계란흰자 64g / 연두부 90g / 토마토 80g / 샐러리 40g / 혼합상추 75g / 소스: 간장5g+들기름3g+깨3g'},
    {id:'d1',lbl:'오전 간식',sub:'아몬드 8알 (11g)'}
  ];
  for (var i=0;i<ex.length;i++) r.push(ex[i]);
  r.push({id:'d3',lbl:'점심 (351kcal)',sub:'닭가슴살 100g / 병아리콩 60g / 혼합상추 75g / 토마토 60g / 샐러리 40g / 소스: 홀그레인머스터드15g+스리라차10g+올리브유3g'});
  r.push({id:'d5',lbl:'저녁 (396kcal)',sub:'닭가슴살 100g / 계란흰자 64g / 병아리콩 60g / 버섯 40g / 양파 20g / 애호박 40g / 옥수수 20g / 혼합상추 75g / 소스: 그릭요거트30g+홀그레인머스터드10g+알룰로스5g'});
  r.push({id:'d4',lbl:'오후 간식',sub:'당근스틱 50g / 샐러리스틱 50g'});
  r.push({id:'d6',lbl:'7시 전 식사 마감',sub:'저녁 7시 이후 금식'});
  r.push({id:'s4',lbl:'인터렉티브 워밍업'});
  r.push({id:'s3',lbl:'스쿼트 50회',sub:'저녁 루틴'});
  r.push({id:'s1',lbl:'취침 10:30'});
  return r;
}
function cpct(ds, dow) {
  var items=gitems(dow), dd=D[ds]||{}, done=0;
  for (var i=0;i<items.length;i++) { if(dd[items[i].id]) done++; }
  return {done:done,total:items.length,pct:Math.round(done/items.length*100)};
}
function apct(arr) {
  var td=0,tt=0;
  for (var i=0;i<arr.length;i++){var r=cpct(dk(arr[i]),arr[i].getDay());td+=r.done;tt+=r.total;}
  return tt>0?Math.round(td/tt*100):0;
}
function gachv(p){for(var i=0;i<AV.length;i++){if(p>=AV[i].min)return AV[i];}return AV[AV.length-1];}
function gcol(p){if(p>=100)return'#34c759';if(p>=80)return'#32ade6';if(p>=60)return'#ff9f0a';if(p>=40)return'#ff375f';return'#8e8e93';}
function setCard(fid,pid,mid,bid,pct){
  var av=gachv(pct);
  document.getElementById(fid).innerHTML=av.face;
  var pe=document.getElementById(pid); pe.textContent=pct+'%'; pe.style.color=av.col;
  var me=document.getElementById(mid); me.textContent=av.msg; me.style.color=av.col;
  var be=document.getElementById(bid); be.style.width=pct+'%'; be.style.background=av.col;
}

// ── 체크 렌더 ────────────────────────────────────────────
function renderCheck() {
  var dates=wdates(off), today=dk(new Date());
  var selD=dates[si], selDs=dk(selD), selR=cpct(selDs,selD.getDay());
  var s=dates[0],e=dates[6];
  document.getElementById('NL').textContent=(s.getMonth()+1)+'/'+s.getDate()+' - '+(e.getMonth()+1)+'/'+e.getDate();
  setCard('DF','DP','DM','DB',selR.pct);
  setCard('WF','WP','WM','WB',apct(dates));
  setCard('MF','MP','MM','MB',apct(mdates()));

  var dg=document.getElementById('DG'); dg.innerHTML='';
  for (var i=0;i<dates.length;i++){
    var d=dates[i],ds=dk(d),r=cpct(ds,d.getDay()),c=gcol(r.pct);
    var el=document.createElement('div');
    el.className='dc'+(ds===today?' tod':'')+(i===si?' sel':'');
    el.setAttribute('data-idx',i);
    el.innerHTML='<div class="dh"><div class="dnm">'+DN[d.getDay()]+'</div><div class="dnum">'+d.getDate()+'</div></div>'+
      '<div class="db"><div class="dbar"><div class="dbfill" style="width:'+r.pct+'%;background:'+c+'"></div></div>'+
      '<div class="dpct">'+r.pct+'%</div></div>';
    dg.appendChild(el);
  }

  var dow=selD.getDay(),type=DT[dow],items=gitems(dow),dd=D[selDs]||{};
  var circ=125.66,dash=circ-(selR.pct/100)*circ,cc=gcol(selR.pct);
  var pnl=document.getElementById('PNL'); pnl.innerHTML='';

  var title=document.createElement('div'); title.className='ptitle';
  title.innerHTML=DN[dow]+'요일 '+(selD.getMonth()+1)+'/'+selD.getDate()+
    ' <span class="bdg '+TB[type]+'">'+TL[type]+'</span>';
  pnl.appendChild(title);

  var sbar=document.createElement('div'); sbar.className='sbar';
  var dots=''; for(var i=0;i<items.length;i++) dots+='<div class="dot'+(dd[items[i].id]?' on':'')+'"></div>';
  sbar.innerHTML='<div class="rw"><svg width="44" height="44" viewBox="0 0 48 48" style="transform:rotate(-90deg)">'+
    '<circle cx="24" cy="24" r="20" fill="none" stroke="#e5e5ea" stroke-width="5"/>'+
    '<circle cx="24" cy="24" r="20" fill="none" stroke="'+cc+'" stroke-width="5" stroke-dasharray="'+circ+'" stroke-dashoffset="'+dash+'" stroke-linecap="round"/>'+
    '</svg><div class="rpct" style="color:'+cc+'">'+selR.pct+'%</div></div>'+
    '<div style="flex:1"><div class="sdone" style="color:'+cc+'">'+selR.done+' / '+selR.total+'</div>'+
    '<div class="ssub">'+(selR.pct===100?'🎉 완벽한 하루!':'하나씩 체크해봐요!')+'</div></div>'+
    '<div class="dots">'+dots+'</div>';
  pnl.appendChild(sbar);

  var sec=document.createElement('div'); sec.className='sec';
  sec.innerHTML='<div class="stitle">오늘의 체크리스트</div>';
  var cks=document.createElement('div'); cks.className='cks';
  for (var i=0;i<items.length;i++){
    var it=items[i],ci=document.createElement('div');
    ci.className='ci'+(dd[it.id]?' on':'');
    ci.setAttribute('data-ds',selDs); ci.setAttribute('data-id',it.id);
    ci.innerHTML='<div class="cb">'+(dd[it.id]?'✓':'')+'</div>'+
      '<div style="flex:1"><div class="clbl">'+it.lbl+'</div>'+
      (it.sub?'<div class="csub">'+it.sub+'</div>':'')+'</div>';
    cks.appendChild(ci);
  }
  sec.appendChild(cks); pnl.appendChild(sec);
}

// ── 신체기록 렌더 ────────────────────────────────────────
function renderBody() {
  var today=dk(new Date());
  document.getElementById('body-date-lbl').textContent=today+' 기록';
  var rec=BD[today]||{};
  document.getElementById('b-weight').value   = rec.weight   || '';
  document.getElementById('b-fat').value      = rec.fat      || '';
  document.getElementById('b-fatpct').value   = rec.fatpct   || '';
  document.getElementById('b-visceral').value = rec.visceral || '';

  // 최근 기록 라벨
  var keys=Object.keys(BD).sort().reverse();
  if (keys.length > 0 && keys[0] !== today) {
    var lr=BD[keys[0]];
    document.getElementById('body-last-lbl').textContent='최근기록: '+keys[0]+' / '+lr.weight+'kg / 체지방'+lr.fatpct+'%';
  } else {
    document.getElementById('body-last-lbl').textContent='';
  }

  // 최근 기록 리스트 (최대 7개)
  var rl=document.getElementById('body-rlist'); rl.innerHTML='';
  var recent=keys.slice(0,7);
  if (recent.length===0) { rl.innerHTML='<div class="no-data">아직 기록이 없어요</div>'; return; }
  for (var i=0;i<recent.length;i++){
    var k=recent[i],r=BD[k],el=document.createElement('div');
    el.className='ritem';
    el.innerHTML='<div class="rdate">'+k.slice(5)+'</div>'+
      '<div class="rstats">'+
      '<div class="rstat">몸무게 <span>'+(r.weight||'-')+'kg</span></div>'+
      '<div class="rstat">지방 <span>'+(r.fat||'-')+'kg</span></div>'+
      '<div class="rstat">체지방 <span>'+(r.fatpct||'-')+'%</span></div>'+
      '<div class="rstat">내장 <span>'+(r.visceral||'-')+'단계</span></div>'+
      '</div>';
    rl.appendChild(el);
  }
}

// ── 그래프 렌더 ──────────────────────────────────────────
var chartInst = null;
var METRIC_LABELS = {weight:'몸무게 (kg)',fat:'지방 무게 (kg)',fatpct:'체지방률 (%)',visceral:'내장지방 지수'};
var METRIC_COLORS = {weight:'#5e5ce6',fat:'#ff9f0a',fatpct:'#ff375f',visceral:'#32ade6'};

function getGraphData() {
  var keys = Object.keys(BD).sort();
  var now = new Date(), filtered = [];

  for (var i=0;i<keys.length;i++){
    var d=dkToDate(keys[i]);
    if (gRange==='week') {
      var diff=(now-d)/(1000*60*60*24);
      if (diff<=7) filtered.push(keys[i]);
    } else if (gRange==='month') {
      if (d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth()) filtered.push(keys[i]);
    } else {
      filtered.push(keys[i]);
    }
  }
  return filtered;
}

function renderGraph() {
  var keys = getGraphData();
  var noData = document.getElementById('no-data');
  var canvas = document.getElementById('myChart');
  document.getElementById('chart-title').textContent = METRIC_LABELS[gMetric] + ' 변화';

  if (keys.length === 0) {
    noData.style.display='block'; canvas.style.display='none';
    if (chartInst) { chartInst=null; }
    return;
  }
  noData.style.display='none'; canvas.style.display='block';

  var labels=[], vals=[];
  for (var i=0;i<keys.length;i++){
    labels.push(keys[i].slice(5));
    vals.push(BD[keys[i]][gMetric] ? parseFloat(BD[keys[i]][gMetric]) : null);
  }

  var col = METRIC_COLORS[gMetric];
  var ctx = canvas.getContext('2d');

  if (chartInst) { ctx.clearRect(0,0,canvas.width,canvas.height); chartInst=null; }

  // 수동 캔버스 그래프 (라이브러리 없이)
  var W=canvas.parentElement.offsetWidth-28, H=160;
  canvas.width=W; canvas.height=H;

  var validVals=vals.filter(function(v){return v!==null;});
  if (validVals.length===0){noData.style.display='block';canvas.style.display='none';return;}

  var minV=Math.min.apply(null,validVals), maxV=Math.max.apply(null,validVals);
  var range=maxV-minV||1;
  var pad={t:20,r:10,b:30,l:40};
  var cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;

  ctx.clearRect(0,0,W,H);

  // 격자선
  ctx.strokeStyle='#f2f2f7'; ctx.lineWidth=1;
  for(var g=0;g<=4;g++){
    var y=pad.t+ch*(g/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cw,y);ctx.stroke();
    var val=(maxV-range*(g/4)).toFixed(1);
    ctx.fillStyle='#8e8e93';ctx.font='9px -apple-system,sans-serif';ctx.textAlign='right';
    ctx.fillText(val,pad.l-4,y+3);
  }

  // X축 라벨
  ctx.fillStyle='#8e8e93';ctx.font='9px -apple-system,sans-serif';ctx.textAlign='center';
  var step=Math.max(1,Math.floor(labels.length/5));
  for(var i=0;i<labels.length;i++){
    if(i%step===0||i===labels.length-1){
      var x=pad.l+cw*(i/(labels.length-1||1));
      ctx.fillText(labels[i],x,H-6);
    }
  }

  // 라인
  ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.beginPath();
  var started=false;
  for(var i=0;i<vals.length;i++){
    if(vals[i]===null)continue;
    var x=pad.l+cw*(i/(vals.length-1||1));
    var y=pad.t+ch*(1-(vals[i]-minV)/range);
    if(!started){ctx.moveTo(x,y);started=true;}else{ctx.lineTo(x,y);}
  }
  ctx.stroke();

  // 점
  for(var i=0;i<vals.length;i++){
    if(vals[i]===null)continue;
    var x=pad.l+cw*(i/(vals.length-1||1));
    var y=pad.t+ch*(1-(vals[i]-minV)/range);
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=col;ctx.font='bold 9px -apple-system,sans-serif';ctx.textAlign='center';
    ctx.fillText(vals[i],x,y-8);
  }
  chartInst=true;
}

for(var i=0;i<tabEls.length;i++){
